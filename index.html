<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>⚡ 一箭又一箭 · 赛博弓道</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1a, #03060c);
            font-family: 'Segoe UI', 'Orbitron', 'Rajdhani', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        /* 全局霓虹扫描线 */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, rgba(0,255,255,0.02) 0px, rgba(0,255,255,0.02) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
            z-index: 999;
        }

        .game-wrapper {
            max-width: 1100px;
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            align-items: flex-start;
        }

        /* 左边游戏区 */
        .game-area {
            flex: 2;
            min-width: 280px;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(4px);
            border-radius: 32px;
            border: 1px solid #0ff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            overflow: hidden;
        }

        .status-bar {
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 20, 30, 0.8);
            border-bottom: 1px solid #0ff;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #1e2a3a;
            border: 1px solid #0ff;
            box-shadow: 0 0 8px #0ff;
            background-size: cover;
            background-position: center;
        }

        .player-name {
            font-weight: bold;
            color: #7df9ff;
            text-shadow: 0 0 3px #0ff;
            font-size: 1rem;
        }

        .score-panel {
            text-align: center;
        }

        .score-label {
            font-size: 0.7rem;
            color: #8aa;
            letter-spacing: 2px;
        }

        .score-value {
            font-size: 2rem;
            font-weight: bold;
            font-family: monospace;
            color: #0ff;
            text-shadow: 0 0 6px #0ff;
            line-height: 1;
        }

        .hearts {
            font-size: 1.6rem;
            letter-spacing: 4px;
            color: #ff4d6d;
            text-shadow: 0 0 2px #ff4d6d;
        }

        canvas {
            display: block;
            width: 100%;
            background: #040a12;
            cursor: pointer;
            touch-action: manipulation;
        }

        /* 右侧排行榜 */
        .leaderboard {
            flex: 1;
            min-width: 240px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            border: 1px solid #f0f;
            box-shadow: 0 0 18px #f0f3;
            padding: 16px 12px;
        }

        .leaderboard h3 {
            font-family: monospace;
            color: #f0f;
            text-align: center;
            margin-bottom: 12px;
            font-size: 1.4rem;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .refresh-icon {
            cursor: pointer;
            background: #2a1e3a;
            padding: 4px 8px;
            border-radius: 40px;
            font-size: 1rem;
        }

        .rank-list {
            max-height: 420px;
            overflow-y: auto;
        }

        .rank-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 10px;
            margin: 6px 0;
            background: #11161f80;
            border-radius: 40px;
            border-left: 3px solid cyan;
        }

        .rank-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #2c3e44;
            background-size: cover;
        }

        .rank-name {
            flex: 1;
            font-size: 0.85rem;
            color: #b0e0ff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .rank-score {
            font-weight: bold;
            color: gold;
            font-family: monospace;
        }

        /* 弹窗 & 登录遮罩 */
        .login-overlay, .gameover-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-card {
            background: #0e1422ee;
            border: 2px solid cyan;
            border-radius: 40px;
            padding: 32px 24px;
            text-align: center;
            width: 280px;
            box-shadow: 0 0 50px cyan;
        }

        .modal-card h2 {
            color: cyan;
            margin-bottom: 16px;
        }

        .line-login-btn {
            background: linear-gradient(135deg, #06c755, #029c3e);
            border: none;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: bold;
            color: white;
            font-size: 1rem;
            display: inline-flex;
            gap: 8px;
            margin-top: 20px;
            cursor: pointer;
        }

        .restart-btn {
            background: cyan;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: bold;
            margin-top: 16px;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }

        button {
            transition: 0.2s;
        }
        button:active { transform: scale(0.96); }
    </style>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="game-wrapper">
    <div class="game-area">
        <div class="status-bar">
            <div class="player-info" id="playerInfoBlock">
                <div class="avatar" id="avatarImg" style="background-image: url(''); background-size: cover;"></div>
                <span class="player-name" id="playerName">訪客</span>
            </div>
            <div class="score-panel">
                <div class="score-label">🏹 当前积分</div>
                <div class="score-value" id="currentScoreUI">0</div>
            </div>
            <div class="hearts" id="heartsUI">❤️ ❤️ ❤️</div>
        </div>
        <canvas id="gameCanvas" width="450" height="550" style="width:100%; height:auto; aspect-ratio:450/550"></canvas>
    </div>

    <div class="leaderboard">
        <h3>🌍 全球排行榜 <span class="refresh-icon" id="refreshLeaderboard">⟳</span></h3>
        <div id="rankList" class="rank-list">加载中...</div>
    </div>
</div>

<!-- 登录蒙层 -->
<div id="loginOverlay" class="login-overlay">
    <div class="modal-card">
        <h2>⚡ 箭客登录</h2>
        <p>使用 LINE 账号 进入赛博领域</p>
        <button class="line-login-btn" id="lineLoginBtn">💬 LINE 一键登录</button>
    </div>
</div>

<!-- Game Over 弹窗 -->
<div id="gameoverOverlay" class="gameover-overlay hidden">
    <div class="modal-card">
        <h2>💀 GAME OVER 💀</h2>
        <p>得分: <span id="finalScoreSpan">0</span></p>
        <button class="restart-btn" id="gameRestartBtn">🔄 再来一局</button>
    </div>
</div>

<script>
    // ========================  配置区域  ========================
    // 🔧 请替换成你自己的真实信息
    const SUPABASE_URL = "https://lqbqgycbyuxjodepxpfe.supabase.co";     // 你提供的
    const SUPABASE_ANON_KEY = "sb_publishable__ccuRo8VOesRE-llsSaRGw_yXvEIlkk"; 
    const LINE_CHANNEL_ID = "2010069700";  // ⚠️ 改为你的纯数字 Channel ID (不带后缀)
    const REDIRECT_URI = window.location.origin + window.location.pathname;  // 自动适配线上/本地
    
    // 游戏配置
    const ROWS = 8;
    const COLS = 7;
    const CELL_W = 450 / COLS;
    const CELL_H = 550 / ROWS;
    
    let supabase;
    let currentUser = null;        // { id, name, picture }
    let gameActive = true;
    let arrows = [];               // 二维数组: null 或 { dir: 0,1,2,3 } 0上 1右 2下 3左
    let lives = 3;
    let currentScore = 0;
    let currentLevel = 1;
    
    // DOM 元素
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const loginOverlay = document.getElementById('loginOverlay');
    const gameoverOverlay = document.getElementById('gameoverOverlay');
    const finalScoreSpan = document.getElementById('finalScoreSpan');
    const heartsUI = document.getElementById('heartsUI');
    const currentScoreUI = document.getElementById('currentScoreUI');
    const rankListDiv = document.getElementById('rankList');
    const playerNameSpan = document.getElementById('playerName');
    const avatarDiv = document.getElementById('avatarImg');
    
    // ========== 初始化 Supabase ==========
    function initSupabase() {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }
    
    // ========== 游戏核心逻辑 ==========
    function initLevel() {
        // 随机生成箭头 (数量随等级增加)
        let arrowCount = Math.min(5 + currentLevel, 25);
        arrows = Array(ROWS).fill().map(() => Array(COLS).fill(null));
        for (let i = 0; i < arrowCount; i++) {
            let row, col;
            do {
                row = Math.floor(Math.random() * ROWS);
                col = Math.floor(Math.random() * COLS);
            } while (arrows[row][col] !== null);
            const dir = Math.floor(Math.random() * 4); // 0上 1右 2下 3左
            arrows[row][col] = { dir };
        }
        drawCanvas();
    }
    
    // 检查从 (row, col) 沿方向移动是否碰到第一个箭头
    function checkArrowCollision(row, col, dir) {
        let deltaRow = 0, deltaCol = 0;
        switch (dir) {
            case 0: deltaRow = -1; break;
            case 1: deltaCol = 1; break;
            case 2: deltaRow = 1; break;
            case 3: deltaCol = -1; break;
        }
        let r = row + deltaRow, c = col + deltaCol;
        while (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
            if (arrows[r][c] !== null) {
                // 碰到了其他箭头 -> 反弹
                return { hit: true, row: r, col: c };
            }
            r += deltaRow;
            c += deltaCol;
        }
        return { hit: false }; // 一路畅通
    }
    
    function tryEliminate(row, col) {
        if (!gameActive) return false;
        const arrow = arrows[row][col];
        if (!arrow) return false;
        
        const collision = checkArrowCollision(row, col, arrow.dir);
        if (collision.hit) {
            // 反弹, 扣血
            lives--;
            updateHeartsUI();
            if (lives <= 0) {
                gameActive = false;
                gameOver();
            } else {
                // 播放一个视觉反馈 (短暂闪红)
                canvas.style.filter = 'drop-shadow(0 0 6px red)';
                setTimeout(() => canvas.style.filter = '', 150);
            }
            return false;
        } else {
            // 消除箭头
            arrows[row][col] = null;
            currentScore += 10;
            currentScoreUI.innerText = currentScore;
            drawCanvas();
            // 检查是否过关
            let remaining = arrows.flat().filter(a => a !== null).length;
            if (remaining === 0) {
                // 过关升级
                currentLevel++;
                lives = Math.min(lives + 1, 5); // 奖励1心，上限5
                updateHeartsUI();
                initLevel();  // 重新生成新关卡
            }
            return true;
        }
    }
    
    function updateHeartsUI() {
        let heartStr = '';
        for (let i=0; i<lives; i++) heartStr += '❤️ ';
        heartsUI.innerText = heartStr.trim() || '💀';
    }
    
    async function gameOver() {
        gameActive = false;
        finalScoreSpan.innerText = currentScore;
        gameoverOverlay.classList.remove('hidden');
        // 提交分数到 Supabase
        if (currentUser && currentScore > 0) {
            await submitScore(currentUser.id, currentScore);
        }
        await loadLeaderboard(); // 刷新榜
    }
    
    async function submitScore(userId, score) {
        if (!supabase) return;
        // 插入一条分数记录 (排行榜取每个用户最高分, 为了简单可以存储后查询)
        await supabase.from('scores').insert({ user_id: userId, score: score });
        // 同时更新或插入 players 的显示名 (已有则忽略)
        await supabase.from('players').upsert({ 
            user_id: userId, 
            display_name: currentUser.name,
            picture_url: currentUser.picture 
        });
    }
    
    // 加载排行榜 (最高分前10)
    async function loadLeaderboard() {
        if (!supabase) return;
        const { data, error } = await supabase
            .from('scores')
            .select(`
                score,
                players (display_name, picture_url, user_id)
            `)
            .order('score', { ascending: false })
            .limit(20);
        if (error) { rankListDiv.innerHTML = '排行榜拉取失败'; return; }
        // 聚合每个用户最高分
        const userBest = new Map();
        for (let item of data) {
            const player = item.players;
            if (!player) continue;
            const uid = player.user_id;
            if (!userBest.has(uid) || userBest.get(uid).score < item.score) {
                userBest.set(uid, { name: player.display_name, picture: player.picture_url, score: item.score });
            }
        }
        const sorted = Array.from(userBest.values()).sort((a,b)=>b.score - a.score).slice(0,10);
        if (sorted.length === 0) { rankListDiv.innerHTML = '暂无排行数据'; return; }
        rankListDiv.innerHTML = sorted.map((u, idx) => `
            <div class="rank-item">
                <div class="rank-avatar" style="background-image: url('${u.picture || ''}'); background-size:cover; background-position:center; background-color:#2a3a4a;"></div>
                <span class="rank-name">${escapeHtml(u.name || '匿名箭客')}</span>
                <span class="rank-score">${u.score}</span>
            </div>
        `).join('');
    }
    
    function escapeHtml(str) { return str?.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}) || '?'; }
    
    // 绘制 canvas (箭头 + 霓虹风格)
    function drawCanvas() {
        ctx.clearRect(0, 0, 450, 550);
        // 网格线
        ctx.strokeStyle = '#0ff3';
        ctx.lineWidth = 1;
        for (let i = 0; i <= COLS; i++) {
            ctx.beginPath();
            ctx.moveTo(i*CELL_W, 0);
            ctx.lineTo(i*CELL_W, 550);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, i*CELL_H);
            ctx.lineTo(450, i*CELL_H);
            ctx.stroke();
        }
        // 绘制箭头
        for (let r=0; r<ROWS; r++) {
            for (let c=0; c<COLS; c++) {
                const a = arrows[r][c];
                if (!a) continue;
                const x = c*CELL_W + CELL_W/2;
                const y = r*CELL_H + CELL_H/2;
                const size = Math.min(CELL_W, CELL_H)*0.55;
                ctx.save();
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#0ff';
                ctx.fillStyle = '#0ff';
                ctx.font = `${size}px "Segoe UI", monospace`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                let arrowChar = '↑';
                if (a.dir === 0) arrowChar = '↑';
                else if (a.dir === 1) arrowChar = '→';
                else if (a.dir === 2) arrowChar = '↓';
                else arrowChar = '←';
                ctx.fillStyle = '#1effbc';
                ctx.shadowColor = '#0ff';
                ctx.fillText(arrowChar, x, y);
                ctx.restore();
            }
        }
    }
    
    // 点击canvas处理
    function handleCanvasTap(e) {
        if (!gameActive) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
            e.preventDefault();
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        let canvasX = (clientX - rect.left) * scaleX;
        let canvasY = (clientY - rect.top) * scaleY;
        if (canvasX<0 || canvasX>canvas.width || canvasY<0 || canvasY>canvas.height) return;
        const col = Math.floor(canvasX / CELL_W);
        const row = Math.floor(canvasY / CELL_H);
        if (row>=0 && row<ROWS && col>=0 && col<COLS && arrows[row][col]) {
            tryEliminate(row, col);
            drawCanvas();
        }
    }
    
    // ========== LINE Login PKCE 流程 ==========
    async function lineLogin() {
        const state = Math.random().toString(36).substring(7);
        localStorage.setItem('line_oauth_state', state);
        const codeVerifier = generateRandomString(64);
        localStorage.setItem('code_verifier', codeVerifier);
        const codeChallenge = await pkceChallenge(codeVerifier);
        const authUrl = `https://access.line.me/oauth2/v2.1/authorize?response_type=code&client_id=${LINE_CHANNEL_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&state=${state}&scope=profile%20openid&code_challenge=${codeChallenge}&code_challenge_method=S256`;
        window.location.href = authUrl;
    }
    
    function generateRandomString(length) {
        const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
        let text = '';
        for(let i=0; i<length; i++) text += possible.charAt(Math.floor(Math.random() * possible.length));
        return text;
    }
    async function pkceChallenge(verifier) {
        const encoder = new TextEncoder();
        const data = encoder.encode(verifier);
        const digest = await crypto.subtle.digest('SHA-256', data);
        return btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/=/g, '').replace(/\+/g, '-').replace(/\//g, '_');
    }
    
    async function handleRedirectAndGetProfile() {
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const state = params.get('state');
        const storedState = localStorage.getItem('line_oauth_state');
        if (!code || !state || state !== storedState) return null;
        localStorage.removeItem('line_oauth_state');
        const codeVerifier = localStorage.getItem('code_verifier');
        localStorage.removeItem('code_verifier');
        // 换取 token (由于无后端，用PKCE间接调用 LINE token endpoint)
        const tokenUrl = 'https://api.line.me/oauth2/v2.1/token';
        const bodyParams = new URLSearchParams();
        bodyParams.append('grant_type', 'authorization_code');
        bodyParams.append('code', code);
        bodyParams.append('redirect_uri', REDIRECT_URI);
        bodyParams.append('client_id', LINE_CHANNEL_ID);
        bodyParams.append('code_verifier', codeVerifier);
        const tokenRes = await fetch(tokenUrl, { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: bodyParams });
        const tokenData = await tokenRes.json();
        if (!tokenData.access_token) return null;
        const profileRes = await fetch('https://api.line.me/v2/profile', { headers: { 'Authorization': `Bearer ${tokenData.access_token}` } });
        const profile = await profileRes.json();
        return { userId: profile.userId, displayName: profile.displayName, pictureUrl: profile.pictureUrl };
    }
    
    async function initLogin() {
        const profile = await handleRedirectAndGetProfile();
        if (profile) {
            currentUser = {
                id: profile.userId,
                name: profile.displayName,
                picture: profile.pictureUrl || ''
            };
            avatarDiv.style.backgroundImage = `url('${currentUser.picture}')`;
            playerNameSpan.innerText = currentUser.name;
            loginOverlay.style.display = 'none';
            // 启动游戏
            resetGame();
            await loadLeaderboard();
            return true;
        } else {
            loginOverlay.style.display = 'flex';
            return false;
        }
    }
    
    function resetGame() {
        gameActive = true;
        lives = 3;
        currentScore = 0;
        currentLevel = 1;
        currentScoreUI.innerText = '0';
        updateHeartsUI();
        initLevel();
        drawCanvas();
        gameoverOverlay.classList.add('hidden');
    }
    
    function restartAfterGameOver() {
        if (!currentUser) return;
        resetGame();
    }
    
    // 绑定事件 & 入口
    window.onload = async () => {
        initSupabase();
        canvas.addEventListener('click', handleCanvasTap);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleCanvasTap(e); });
        document.getElementById('lineLoginBtn').onclick = () => lineLogin();
        document.getElementById('gameRestartBtn').onclick = () => { restartAfterGameOver(); };
        document.getElementById('refreshLeaderboard').onclick = () => loadLeaderboard();
        const logged = await initLogin();
        if (!logged) {
            // 未登录展示登录界面, 游戏暂不启动
            return;
        }
    };
</script>
</body>
</html>
