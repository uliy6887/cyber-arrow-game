<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Arrow 2D - 賽博解謎</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon-blue: #00f2ff; --neon-pink: #ff00ff; --grid-bg: #0a0a0c; }
        body { margin: 0; background: var(--grid-bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; display: flex; flex-direction: column; align-items: center; }
        
        /* UI 層 - 賽博風格 */
        #ui-layer { width: 100%; padding: 15px 25px; display: flex; justify-content: space-between; box-sizing: border-box; background: rgba(0,0,0,0.8); border-bottom: 1px solid var(--neon-blue); z-index: 10; }
        .score-box { color: var(--neon-blue); font-weight: bold; font-size: 20px; text-shadow: 0 0 10px var(--neon-blue); }
        
        /* 遊戲容器 */
        #game-container { position: relative; width: 90vw; height: 70vh; margin-top: 20px; background: #111; border: 2px solid var(--neon-blue); box-shadow: 0 0 20px rgba(0,242,255,0.2); border-radius: 4px; overflow: hidden; }
        
        /* 箭頭樣式 - 變細且具發光感 */
        .arrow { position: absolute; cursor: pointer; transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1); display: flex; align-items: center; justify-content: center; box-sizing: border-box; }
        .arrow-body { position: absolute; background: rgba(0,0,0,0.8); border: 1.5px solid var(--color); box-shadow: 0 0 8px var(--color); border-radius: 2px; width: 100%; height: 100%; }
        .arrow-head { width: 0; height: 0; border-style: solid; position: absolute; z-index: 2; }
        
        /* 登入畫面 */
        #login-screen { position: fixed; inset: 0; background: var(--grid-bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .btn { background: none; color: var(--neon-pink); border: 2px solid var(--neon-pink); padding: 12px 30px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 0 10px var(--neon-pink); text-transform: uppercase; letter-spacing: 2px; }
        .btn:active { background: var(--neon-pink); color: white; }
    </style>
</head>
<body>

<div id="login-screen">
    <h1 style="color:var(--neon-blue); text-shadow: 0 0 20px var(--neon-blue); letter-spacing: 5px;">CYBER ARROW</h1>
    <button class="btn" onclick="liff.login()">Initialize Link</button>
</div>

<div id="ui-layer">
    <div class="score-box">DECRYPTED: <span id="score">0</span></div>
    <button class="btn" style="padding:5px 15px; font-size: 12px;" onclick="uploadCurrentScore()">Sync Data</button>
</div>

<div id="game-container">
    <!-- 箭頭由 JS 渲染 -->
</div>

<script>
const LIFF_ID = "2010069700-ApwAjal4";
const SB_URL = "https://lqbqgycbyuxjodepxpfe.supabase.co";
const SB_KEY = "Sb_publishable__ccuRo8VOesRE-llsSaRGw_yXvEIlkk";

const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
let currentScore = 0;
let userProfile = null;
let arrows = [];

const DIRS = {
    UP:    { x: 0,  y: -1, color: '#ff00ff' }, // 霓虹粉
    DOWN:  { x: 0,  y: 1,  color: '#00f2ff' }, // 霓虹藍
    LEFT:  { x: -1, y: 0,  color: '#fff'    }, // 白色
    RIGHT: { x: 1,  y: 0,  color: '#ffff00' }  // 黃色
};

async function initGame() {
    await liff.init({ liffId: LIFF_ID });
    if (liff.isLoggedIn()) {
        userProfile = await liff.getProfile();
        document.getElementById('login-screen').style.display = 'none';
        generateLevel();
    }
}

function generateLevel() {
    const container = document.getElementById('game-container');
    container.innerHTML = '';
    arrows = [];
    
    // 模擬圖片中纖細且交錯的佈局
    // 寬度調細 (25px)，長度加長
    const levelData = [
        { id: 1, x: 20,  y: 150, w: 250, h: 22, dir: 'RIGHT' },
        { id: 2, x: 220, y: 30,  w: 22,  h: 280, dir: 'UP' },
        { id: 3, x: 60,  y: 20,  w: 22,  h: 350, dir: 'DOWN' },
        { id: 4, x: 40,  y: 300, w: 280, h: 22, dir: 'LEFT' },
        { id: 5, x: 120, y: 100, w: 22,  h: 180, dir: 'UP' },
        { id: 6, x: 80,  y: 180, w: 200, h: 22, dir: 'RIGHT' },
        { id: 7, x: 10,  y: 50,  w: 300, h: 22, dir: 'LEFT' }
    ];

    levelData.forEach(data => {
        const div = document.createElement('div');
        div.className = 'arrow';
        div.style.left = data.x + 'px';
        div.style.top = data.y + 'px';
        div.style.width = data.w + 'px';
        div.style.height = data.h + 'px';
        div.style.setProperty('--color', DIRS[data.dir].color);
        
        const body = document.createElement('div');
        body.className = 'arrow-body';
        div.appendChild(body);

        const head = document.createElement('div');
        head.className = 'arrow-head';
        applyArrowHeadStyle(head, data.dir, DIRS[data.dir].color);
        div.appendChild(head);

        div.onclick = () => tryMove(data, div);
        container.appendChild(div);
        arrows.push({ ...data, element: div, active: true });
    });
}

function applyArrowHeadStyle(head, dir, color) {
    const s = 6; // 箭頭大小
    if (dir === 'RIGHT') { head.style.borderWidth = `${s}px 0 ${s}px ${s+2}px`; head.style.borderColor = `transparent transparent transparent ${color}`; head.style.right = '-8px'; }
    if (dir === 'LEFT')  { head.style.borderWidth = `${s}px ${s+2}px ${s}px 0`; head.style.borderColor = `transparent ${color} transparent transparent`; head.style.left = '-8px'; }
    if (dir === 'UP')    { head.style.borderWidth = `0 ${s}px ${s+2}px ${s}px`; head.style.borderColor = `transparent transparent ${color} transparent`; head.style.top = '-8px'; }
    if (dir === 'DOWN')  { head.style.borderWidth = `${s+2}px ${s}px 0 ${s}px`; head.style.borderColor = `${color} transparent transparent transparent`; head.style.bottom = '-8px'; }
}

function tryMove(arrow, element) {
    if (!arrow.active) return;
    const dir = DIRS[arrow.dir];
    let blocked = false;

    // 檢查碰撞邏輯
    arrows.forEach(other => {
        if (!other.active || other.id === arrow.id) return;
        const margin = 2; 
        const a = { l: arrow.x, r: arrow.x + arrow.w, t: arrow.y, b: arrow.y + arrow.h };
        const o = { l: other.x, r: other.x + other.w, t: other.y, b: other.y + other.h };

        if (arrow.dir === 'RIGHT' && o.l >= a.r && !(o.b <= a.t || o.t >= a.b)) blocked = true;
        if (arrow.dir === 'LEFT'  && o.r <= a.l && !(o.b <= a.t || o.t >= a.b)) blocked = true;
        if (arrow.dir === 'UP'    && o.b <= a.t && !(o.r <= a.l || o.l >= a.r)) blocked = true;
        if (arrow.dir === 'DOWN'  && o.y >= a.b && !(o.r <= a.l || o.l >= a.r)) blocked = true;
    });

    if (blocked) {
        element.style.transform = `translate(${dir.x * 12}px, ${dir.y * 12}px)`;
        setTimeout(() => { element.style.transform = 'translate(0,0)'; }, 80);
    } else {
        arrow.active = false;
        // 點了就往前衝！
        element.style.transform = `translate(${dir.x * 800}px, ${dir.y * 800}px)`;
        currentScore++;
        document.getElementById('score').innerText = currentScore;
        
        if(arrows.every(a => !a.active)) {
            setTimeout(() => { alert("SYSTEM CLEARED"); generateLevel(); }, 400);
        }
    }
}

async function uploadCurrentScore() {
    if(!userProfile) return;
    const { error } = await supabaseClient.from('leaderboard').upsert({
        line_id: userProfile.userId, username: userProfile.displayName,
        picture_url: userProfile.pictureUrl, score: currentScore
    }, { onConflict: 'line_id' });
    if(!error) alert("DATA SYNCED");
}

initGame();
</script>
</body>
</html>
