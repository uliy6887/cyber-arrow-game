<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Arrow 2.0 - 物理碰撞版</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon-blue: #00f2ff; --neon-pink: #ff00ff; --bg: #030305; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; display: flex; flex-direction: column; align-items: center; }
        
        #ui-layer { width: 100%; padding: 15px 25px; display: flex; justify-content: space-between; background: rgba(0,0,0,0.95); border-bottom: 1px solid var(--neon-blue); z-index: 50; box-sizing: border-box; }
        .score-box { color: var(--neon-blue); font-weight: bold; font-size: 1.1rem; text-shadow: 0 0 8px var(--neon-blue); }
        
        #game-container { position: relative; width: 92vw; height: 78vh; margin-top: 15px; background: #000; border: 1px solid rgba(0,242,255,0.2); border-radius: 4px; overflow: hidden; }
        
        /* 極細箭頭樣式 */
        .arrow { position: absolute; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 5; }
        .arrow-body { position: absolute; inset: 0; background: #000; border: 1.2px solid var(--color); box-shadow: 0 0 12px var(--color); border-radius: 1px; }
        .arrow-head { width: 0; height: 0; border-style: solid; position: absolute; z-index: 10; filter: drop-shadow(0 0 3px var(--color)); }
        
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .btn { background: transparent; color: var(--neon-pink); border: 1px solid var(--neon-pink); padding: 10px 20px; cursor: pointer; font-weight: bold; letter-spacing: 2px; box-shadow: 0 0 10px rgba(255,0,255,0.3); }
    </style>
</head>
<body>

<div id="login-screen">
    <h1 style="color:var(--neon-blue); text-shadow: 0 0 15px var(--neon-blue); font-size: 1.5rem;">CORE DECRYPTION</h1>
    <button class="btn" onclick="liff.login()">AUTHORIZE LOGIN</button>
</div>

<div id="ui-layer">
    <div class="score-box">CLEARED: <span id="score">0</span></div>
    <button class="btn" style="font-size: 10px; border-color: var(--neon-blue); color: var(--neon-blue);" onclick="uploadCurrentScore()">SYNC</button>
</div>

<div id="game-container"></div>

<script>
const CONFIG = {
    LIFF_ID: "2010069700-ApwAjal4",
    SB_URL: "https://lqbqgycbyuxjodepxpfe.supabase.co",
    SB_KEY: "Sb_publishable__ccuRo8VOesRE-llsSaRGw_yXvEIlkk"
};

const DIRS = {
    UP:    { dx: 0,  dy: -1, color: '#ff00ff' },
    DOWN:  { dx: 0,  dy: 1,  color: '#00f2ff' },
    LEFT:  { dx: -1, dy: 0,  color: '#ffffff' },
    RIGHT: { dx: 1,  dy: 0,  color: '#ffff00' }
};

let supabaseClient;
let currentScore = 0;
let userProfile = null;
let arrows = [];

async function init() {
    supabaseClient = supabase.createClient(CONFIG.SB_URL, CONFIG.SB_KEY);
    try {
        await liff.init({ liffId: CONFIG.LIFF_ID });
        if (liff.isLoggedIn()) {
            userProfile = await liff.getProfile();
            document.getElementById('login-screen').style.display = 'none';
            generateLevel();
        }
    } catch (e) { console.error(e); }
}

function generateLevel() {
    const container = document.getElementById('game-container');
    container.innerHTML = '';
    arrows = [];
    
    // 模擬圖片纖細長條數據 (寬度 12px)
    const levelData = [
        { id: 1, x: 20,  y: 120, w: 280, h: 12, dir: 'RIGHT' },
        { id: 2, x: 240, y: 50,  w: 12,  h: 300, dir: 'UP' },
        { id: 3, x: 80,  y: 30,  w: 12,  h: 400, dir: 'DOWN' },
        { id: 4, x: 40,  y: 320, w: 260, h: 12, dir: 'LEFT' },
        { id: 5, x: 150, y: 100, w: 12,  h: 200, dir: 'UP' },
        { id: 6, x: 10,  y: 200, w: 320, h: 12, dir: 'RIGHT' },
        { id: 7, x: 180, y: 20,  w: 12,  h: 350, dir: 'DOWN' }
    ];

    levelData.forEach(data => {
        const div = document.createElement('div');
        div.className = 'arrow';
        div.style.left = data.x + 'px';
        div.style.top = data.y + 'px';
        div.style.width = data.w + 'px';
        div.style.height = data.h + 'px';
        div.style.setProperty('--color', DIRS[data.dir].color);
        
        const body = document.createElement('div');
        body.className = 'arrow-body';
        div.appendChild(body);

        const head = document.createElement('div');
        head.className = 'arrow-head';
        const s = 4; // 極細三角形
        const color = DIRS[data.dir].color;
        if(data.dir === 'RIGHT') { head.style.borderWidth = `${s}px 0 ${s}px ${s+2}px`; head.style.borderColor = `transparent transparent transparent ${color}`; head.style.right = '-6px'; }
        if(data.dir === 'LEFT')  { head.style.borderWidth = `${s}px ${s+2}px ${s}px 0`; head.style.borderColor = `transparent ${color} transparent transparent`; head.style.left = '-6px'; }
        if(data.dir === 'UP')    { head.style.borderWidth = `0 ${s}px ${s+2}px ${s}px`; head.style.borderColor = `transparent transparent ${color} transparent`; head.style.top = '-6px'; }
        if(data.dir === 'DOWN')  { head.style.borderWidth = `${s+2}px ${s}px 0 ${s}px`; head.style.borderColor = `${color} transparent transparent transparent`; head.style.bottom = '-6px'; }
        div.appendChild(head);

        div.onclick = () => startMove(data, div);
        container.appendChild(div);
        arrows.push({ ...data, element: div, active: true, moving: false });
    });
}

function startMove(arrow, element) {
    if (!arrow.active || arrow.moving) return;
    arrow.moving = true;
    
    const speed = 8;
    const dir = DIRS[arrow.dir];
    
    const moveFrame = () => {
        if (!arrow.moving) return;

        // 預測下一步位置
        const nextX = arrow.x + dir.dx * speed;
        const nextY = arrow.y + dir.dy * speed;
        
        // 碰撞檢查
        let blocker = null;
        arrows.forEach(other => {
            if (!other.active || other.id === arrow.id) return;
            // 碰撞邊界判定
            const a = { l: nextX, r: nextX + arrow.w, t: nextY, b: nextY + arrow.h };
            const o = { l: other.x, r: other.x + other.w, t: other.y, b: other.y + other.h };
            
            const isOverlap = !(a.r <= o.l || a.l >= o.r || a.b <= o.t || a.t >= o.b);
            if (isOverlap) blocker = other;
        });

        if (blocker) {
            // 彈跳特效 (彈回 15px)
            arrow.moving = false;
            element.style.transition = 'transform 0.1s ease-out';
            element.style.transform = `translate(${dir.dx * 15}px, ${dir.dy * 15}px)`;
            setTimeout(() => {
                element.style.transform = 'translate(0,0)';
                setTimeout(() => { 
                    element.style.transition = ''; 
                    arrow.moving = false; 
                }, 100);
            }, 100);
            return;
        }

        // 更新實際座標
        arrow.x = nextX;
        arrow.y = nextY;
        element.style.left = arrow.x + 'px';
        element.style.top = arrow.y + 'px';

        // 離開螢幕邊界判定
        const out = arrow.x < -400 || arrow.x > 800 || arrow.y < -400 || arrow.y > 1000;
        if (out) {
            arrow.active = false;
            arrow.moving = false;
            currentScore++;
            document.getElementById('score').innerText = currentScore;
            if(arrows.every(a => !a.active)) setTimeout(generateLevel, 600);
            return;
        }

        requestAnimationFrame(moveFrame);
    };
    
    requestAnimationFrame(moveFrame);
}

async function uploadCurrentScore() {
    if(!userProfile) return;
    await supabaseClient.from('leaderboard').upsert({
        line_id: userProfile.userId, username: userProfile.displayName,
        picture_url: userProfile.pictureUrl, score: currentScore
    }, { onConflict: 'line_id' });
    alert("MEMORY SYNCED");
}

window.onload = init;
</script>
</body>
</html>
